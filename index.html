<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מכירת החצר של בלסבלג פלטי</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #FBF7F0;
    --cream-dark: #F2EAD8;
    --brown: #4A3728;
    --brown-mid: #7A5C45;
    --brown-light: #B8926A;
    --orange: #E8621A;
    --orange-light: #F28C47;
    --orange-pale: #FDF0E8;
    --green: #2D6A4F;
    --green-light: #52B788;
    --text: #2C1F14;
    --text-mid: #6B4F38;
    --text-light: #9C7A60;
    --border: #D9C9B5;
    --shadow: rgba(74,55,40,0.12);
    --white: #FFFFFF;
  }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    direction: rtl;
  }

  #root { min-height: 100vh; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--cream-dark); }
  ::-webkit-scrollbar-thumb { background: var(--brown-light); border-radius: 3px; }

  /* Global animations */
  @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  @keyframes slideIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }
  @keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.04); } }

  .fade-in { animation: fadeIn 0.4s ease forwards; }

  /* Layout */
  .app-layout { display:flex; min-height:100vh; }

  /* Sidebar */
  .sidebar {
    width: 240px;
    background: var(--brown);
    color: var(--white);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; right: 0; bottom: 0;
    z-index: 100;
    transition: transform 0.3s ease;
  }
  .sidebar-logo {
    padding: 1.5rem 1.25rem 1rem;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .sidebar-logo h1 {
    font-size: 1.05rem;
    font-weight: 800;
    line-height: 1.3;
    color: var(--orange-light);
  }
  .sidebar-logo p {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.5);
    margin-top: 2px;
  }
  .sidebar-nav { padding: 1rem 0; flex: 1; }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0.7rem 1.25rem;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 0.9rem;
    color: rgba(255,255,255,0.75);
    border-right: 3px solid transparent;
    user-select: none;
  }
  .nav-item:hover { background: rgba(255,255,255,0.07); color: var(--white); }
  .nav-item.active { background: rgba(232,98,26,0.2); color: var(--orange-light); border-right-color: var(--orange-light); }
  .nav-icon { font-size: 1.1rem; min-width: 20px; text-align: center; }

  /* Mobile header */
  .mobile-header {
    display: none;
    background: var(--brown);
    color: var(--white);
    padding: 0.875rem 1rem;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 200;
  }
  .mobile-header h1 { font-size: 0.9rem; font-weight: 800; color: var(--orange-light); }
  .hamburger {
    background: none; border: none; color: var(--white);
    font-size: 1.4rem; cursor: pointer; padding: 4px;
    line-height: 1;
  }

  /* Mobile overlay */
  .mobile-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 150;
  }
  .mobile-overlay.open { display: block; }
  .sidebar.mobile-open { transform: translateX(0) !important; }

  /* Main content */
  .main-content {
    margin-right: 240px;
    flex: 1;
    min-height: 100vh;
    padding: 2rem;
  }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 0.6rem 1.2rem;
    border-radius: 8px;
    font-family: 'Heebo', sans-serif;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    text-decoration: none;
  }
  .btn-primary { background: var(--orange); color: var(--white); }
  .btn-primary:hover { background: #D0551A; transform: translateY(-1px); }
  .btn-secondary { background: var(--white); color: var(--brown); border: 1.5px solid var(--border); }
  .btn-secondary:hover { background: var(--cream-dark); }
  .btn-danger { background: #DC2626; color: var(--white); }
  .btn-danger:hover { background: #B91C1C; }
  .btn-success { background: var(--green); color: var(--white); }
  .btn-sm { padding: 0.4rem 0.875rem; font-size: 0.8rem; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

  /* Cards */
  .card {
    background: var(--white);
    border-radius: 14px;
    border: 1px solid var(--border);
    overflow: hidden;
    transition: all 0.25s ease;
  }
  .card:hover { box-shadow: 0 8px 24px var(--shadow); transform: translateY(-3px); }

  /* Item card */
  .item-card { cursor: pointer; }
  .item-card-img {
    width: 100%;
    aspect-ratio: 4/3;
    object-fit: cover;
    background: var(--cream-dark);
    display: flex; align-items: center; justify-content: center;
    font-size: 2.5rem;
    color: var(--border);
  }
  .item-card-img img { width: 100%; height: 100%; object-fit: cover; }
  .item-card-body { padding: 0.875rem 1rem 1rem; }
  .item-card-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 4px; color: var(--text); }
  .item-card-desc { font-size: 0.8rem; color: var(--text-light); line-height: 1.4; margin-bottom: 8px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .item-card-footer { display:flex; align-items:center; justify-content:space-between; }
  .price { font-size: 1.1rem; font-weight: 800; color: var(--orange); }
  .price span { font-size: 0.7rem; font-weight: 400; color: var(--text-light); }

  /* Status badge */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 700;
  }
  .badge-available { background: #D1FAE5; color: #065F46; }
  .badge-reserved { background: #FEF3C7; color: #92400E; }
  .badge-sold { background: #FEE2E2; color: #991B1B; }

  /* Category chip */
  .chip {
    display: inline-flex; align-items: center;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    border: 1.5px solid var(--border);
    background: var(--white);
    color: var(--text-mid);
    user-select: none;
  }
  .chip:hover { border-color: var(--orange); color: var(--orange); }
  .chip.active { background: var(--orange); color: var(--white); border-color: var(--orange); }

  /* Grid */
  .items-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1.25rem;
  }

  /* Search */
  .search-bar {
    display: flex;
    align-items: center;
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 0.5rem 1rem;
    gap: 8px;
    transition: border-color 0.2s;
  }
  .search-bar:focus-within { border-color: var(--orange); }
  .search-bar input {
    border: none; outline: none;
    font-family: 'Heebo', sans-serif;
    font-size: 0.9rem;
    flex: 1;
    background: transparent;
    color: var(--text);
    direction: rtl;
  }
  .search-bar input::placeholder { color: var(--text-light); }
  .search-icon { color: var(--text-light); font-size: 1rem; }

  /* Forms */
  .form-group { margin-bottom: 1rem; }
  .form-label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-mid); margin-bottom: 5px; }
  .form-control {
    width: 100%;
    padding: 0.6rem 0.875rem;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'Heebo', sans-serif;
    font-size: 0.875rem;
    color: var(--text);
    background: var(--white);
    transition: border-color 0.2s;
    direction: rtl;
  }
  .form-control:focus { outline: none; border-color: var(--orange); }
  textarea.form-control { resize: vertical; min-height: 80px; }
  select.form-control { appearance: none; cursor: pointer; }

  /* Hero */
  .hero {
    background: linear-gradient(135deg, var(--brown) 0%, var(--brown-mid) 100%);
    border-radius: 18px;
    padding: 2.5rem 2rem;
    margin-bottom: 2rem;
    color: var(--white);
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -30px; left: -30px;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: rgba(232,98,26,0.15);
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: -50px; right: 10%;
    width: 220px; height: 220px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
  }
  .hero-content { position: relative; z-index: 1; }
  .hero h2 { font-size: 2rem; font-weight: 900; line-height: 1.2; margin-bottom: 0.5rem; }
  .hero p { font-size: 0.95rem; color: rgba(255,255,255,0.75); margin-bottom: 1.5rem; }
  .hero-stats { display: flex; gap: 1.5rem; }
  .hero-stat { text-align: center; }
  .hero-stat strong { display: block; font-size: 1.5rem; font-weight: 900; color: var(--orange-light); }
  .hero-stat span { font-size: 0.75rem; color: rgba(255,255,255,0.6); }

  /* Item detail */
  .item-detail { max-width: 700px; margin: 0 auto; }
  .item-detail-img {
    width: 100%;
    aspect-ratio: 16/9;
    border-radius: 14px;
    overflow: hidden;
    background: var(--cream-dark);
    display: flex; align-items: center; justify-content: center;
    font-size: 4rem;
    color: var(--border);
    margin-bottom: 1.5rem;
  }
  .item-detail-img img { width: 100%; height: 100%; object-fit: cover; }
  .item-detail-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
  .item-detail-title { font-size: 1.5rem; font-weight: 800; }
  .item-detail-price { font-size: 2rem; font-weight: 900; color: var(--orange); white-space: nowrap; }

  /* Waitlist */
  .waitlist-item {
    display: flex; align-items: center; gap: 12px;
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.875rem;
  }
  .waitlist-item:last-child { border-bottom: none; }
  .position-badge {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--orange-pale);
    color: var(--orange);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 0.875rem;
    flex-shrink: 0;
  }

  /* Admin */
  .admin-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
  .admin-table th {
    background: var(--cream-dark);
    padding: 0.7rem 1rem;
    text-align: right;
    font-weight: 700;
    color: var(--text-mid);
    border-bottom: 1px solid var(--border);
  }
  .admin-table td {
    padding: 0.7rem 1rem;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    vertical-align: middle;
  }
  .admin-table tr:last-child td { border-bottom: none; }
  .admin-table tr:hover td { background: var(--cream); }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 500;
    display: flex; align-items: center; justify-content: center;
    padding: 1rem;
    animation: fadeIn 0.2s ease;
  }
  .modal {
    background: var(--white);
    border-radius: 16px;
    padding: 1.75rem;
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideIn 0.3s ease;
  }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
  .modal-title { font-size: 1.1rem; font-weight: 800; }
  .modal-close { background: none; border: none; font-size: 1.25rem; cursor: pointer; color: var(--text-light); padding: 4px; }

  /* Image upload */
  .image-upload-area {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--cream);
  }
  .image-upload-area:hover { border-color: var(--orange); background: var(--orange-pale); }
  .image-preview { width: 100%; max-height: 200px; object-fit: contain; border-radius: 8px; margin-top: 12px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--brown);
    color: var(--white);
    padding: 0.75rem 1.5rem;
    border-radius: 30px;
    font-size: 0.875rem;
    font-weight: 600;
    z-index: 9999;
    animation: fadeIn 0.3s ease;
    white-space: nowrap;
  }

  /* Password screen */
  .password-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 60vh;
    text-align: center;
  }
  .password-icon { font-size: 3rem; margin-bottom: 1rem; }
  .password-screen h2 { font-size: 1.3rem; font-weight: 800; margin-bottom: 0.5rem; }
  .password-screen p { color: var(--text-light); font-size: 0.875rem; margin-bottom: 1.5rem; }

  /* Section title */
  .section-title {
    font-size: 1.3rem; font-weight: 800; margin-bottom: 1rem;
    display: flex; align-items: center; gap: 8px;
    color: var(--text);
  }
  .section-title::after {
    content: '';
    flex: 1; height: 2px;
    background: linear-gradient(to left, transparent, var(--border));
  }

  /* Empty state */
  .empty-state {
    text-align: center; padding: 3rem 1rem;
    color: var(--text-light);
  }
  .empty-state .emoji { font-size: 3rem; margin-bottom: 0.75rem; }
  .empty-state p { font-size: 0.95rem; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 1.5rem; background: var(--cream-dark); border-radius: 10px; padding: 4px; }
  .tab {
    flex: 1; padding: 0.5rem; text-align: center;
    border-radius: 8px; cursor: pointer;
    font-size: 0.85rem; font-weight: 600;
    transition: all 0.2s;
    color: var(--text-mid);
    border: none; background: none;
    font-family: 'Heebo', sans-serif;
  }
  .tab.active { background: var(--white); color: var(--orange); box-shadow: 0 2px 8px var(--shadow); }

  /* Page header */
  .page-header { margin-bottom: 1.75rem; }
  .page-header h2 { font-size: 1.6rem; font-weight: 900; color: var(--text); }
  .page-header p { font-size: 0.875rem; color: var(--text-light); margin-top: 3px; }

  /* Responsive */
  @media (max-width: 768px) {
    .sidebar { transform: translateX(100%); }
    .main-content { margin-right: 0; padding: 1rem; }
    .mobile-header { display: flex; }
    .items-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 0.875rem; }
    .hero { padding: 1.5rem; border-radius: 14px; }
    .hero h2 { font-size: 1.4rem; }
    .hero-stats { gap: 1rem; }
    .item-detail-header { flex-direction: column; gap: 0.5rem; }
    .admin-table { font-size: 0.8rem; }
    .admin-table th, .admin-table td { padding: 0.5rem 0.625rem; }
  }

  /* Pickup info */
  .info-row {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.85rem; color: var(--text-mid);
    padding: 6px 0;
  }
  .info-icon { font-size: 1rem; }

  /* Divider */
  .divider { height: 1px; background: var(--border); margin: 1.25rem 0; }

  .text-success { color: var(--green); }
  .text-danger { color: #DC2626; }
  .fw-bold { font-weight: 700; }
  .mb-1 { margin-bottom: 0.5rem; }
  .mt-1 { margin-top: 0.5rem; }
  .flex { display: flex; }
  .gap-2 { gap: 8px; }
  .items-center { align-items: center; }
  .justify-between { justify-content: space-between; }
  .flex-wrap { flex-wrap: wrap; }
  .mt-2 { margin-top: 1rem; }
  .mb-2 { margin-bottom: 1rem; }
  .pa-1 { padding: 0.5rem; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

// ─── LocalStorage DB ──────────────────────────────────────────────────────────
const DB = {
  get(key, def) {
    try { return JSON.parse(localStorage.getItem(key)) ?? def; } catch { return def; }
  },
  set(key, val) { localStorage.setItem(key, JSON.stringify(val)); }
};

function useDB(key, def) {
  const [data, setData] = useState(() => DB.get(key, def));
  const update = useCallback((fn) => {
    setData(prev => {
      const next = typeof fn === 'function' ? fn(prev) : fn;
      DB.set(key, next);
      return next;
    });
  }, [key]);
  return [data, update];
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

// ─── Status helpers ──────────────────────────────────────────────────────────
const STATUS_LABEL = { available: 'פנוי', reserved: 'שמור', sold: 'נמכר' };
const STATUS_CLS   = { available: 'badge-available', reserved: 'badge-reserved', sold: 'badge-sold' };
const STATUS_DOT   = { available: '🟢', reserved: '🟡', sold: '🔴' };

// ─── Toast ───────────────────────────────────────────────────────────────────
function Toast({ msg, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2500); return () => clearTimeout(t); }, []);
  return <div className="toast">{msg}</div>;
}

// ─── Image ───────────────────────────────────────────────────────────────────
function ItemImage({ url, emoji = '📦', className = '' }) {
  const [err, setErr] = useState(false);
  if (!url || err) return <div className={`item-card-img ${className}`}>{emoji}</div>;
  return (
    <div className={`item-card-img ${className}`}>
      <img src={url} alt="" onError={() => setErr(true)} />
    </div>
  );
}

// ─── Item Card ───────────────────────────────────────────────────────────────
function ItemCard({ item, onClick }) {
  return (
    <div className="card item-card fade-in" onClick={() => onClick(item)}>
      <ItemImage url={item.image_url} />
      <div className="item-card-body">
        <div className="flex items-center justify-between mb-1" style={{gap:'6px'}}>
          <span className="item-card-title" style={{flex:1}}>{item.title}</span>
          <span className={`badge ${STATUS_CLS[item.status]}`}>{STATUS_LABEL[item.status]}</span>
        </div>
        {item.category && <div style={{fontSize:'0.72rem',color:'var(--text-light)',marginBottom:'4px'}}>🏷️ {item.category}</div>}
        <p className="item-card-desc">{item.description}</p>
        <div className="item-card-footer">
          <span className="price">₪{item.price.toLocaleString()}</span>
          {item.pickup_date && <span style={{fontSize:'0.72rem',color:'var(--text-light)'}}>📅 {new Date(item.pickup_date).toLocaleDateString('he-IL')}</span>}
        </div>
      </div>
    </div>
  );
}

// ─── Registration Form ────────────────────────────────────────────────────────
function RegForm({ item, registrations, onRegister }) {
  const [form, setForm] = useState({ name:'', phone:'', note:'' });
  const [loading, setLoading] = useState(false);

  const activeRegs = registrations.filter(r => r.item_id === item.id && r.status === 'active');

  function submit(e) {
    e.preventDefault();
    if (!form.name.trim() || !form.phone.trim()) return;
    setLoading(true);
    setTimeout(() => {
      onRegister({
        id: uid(),
        item_id: item.id,
        registrant_name: form.name.trim(),
        registrant_phone: form.phone.trim(),
        note: form.note.trim(),
        position: activeRegs.length + 1,
        status: 'active',
        created_at: new Date().toISOString()
      });
      setForm({ name:'', phone:'', note:'' });
      setLoading(false);
    }, 600);
  }

  if (item.status === 'sold') {
    return <div style={{textAlign:'center',padding:'1rem',color:'var(--text-light)'}}>🔴 פריט זה נמכר</div>;
  }

  return (
    <form onSubmit={submit}>
      <div className="form-group">
        <label className="form-label">שם מלא *</label>
        <input className="form-control" placeholder="ישראל ישראלי" value={form.name}
          onChange={e => setForm(p=>({...p, name:e.target.value}))} required />
      </div>
      <div className="form-group">
        <label className="form-label">טלפון *</label>
        <input className="form-control" placeholder="050-0000000" value={form.phone}
          onChange={e => setForm(p=>({...p, phone:e.target.value}))} required />
      </div>
      <div className="form-group">
        <label className="form-label">הערה (אופציונלי)</label>
        <textarea className="form-control" placeholder="..." value={form.note}
          onChange={e => setForm(p=>({...p, note:e.target.value}))} />
      </div>
      <button type="submit" className="btn btn-primary" style={{width:'100%'}} disabled={loading}>
        {loading ? '⏳ שולח...' : activeRegs.length === 0 ? '✅ הרשם לקבלת הפריט' : '📋 הצטרף לרשימת המתנה'}
      </button>
      {activeRegs.length > 0 &&
        <p style={{fontSize:'0.78rem',color:'var(--text-light)',textAlign:'center',marginTop:'8px'}}>
          {activeRegs.length} {activeRegs.length === 1 ? 'אדם' : 'אנשים'} ברשימה לפניך
        </p>
      }
    </form>
  );
}

// ─── Item Detail Page ─────────────────────────────────────────────────────────
function ItemDetail({ item, registrations, onRegister, onBack }) {
  const activeRegs = registrations.filter(r => r.item_id === item.id && r.status === 'active')
    .sort((a,b) => a.position - b.position);

  function share() {
    const text = `בדוק/י את הפריט הזה: ${item.title} ב-₪${item.price}`;
    if (navigator.share) navigator.share({ title: item.title, text });
    else { navigator.clipboard?.writeText(text); }
  }

  return (
    <div className="item-detail fade-in">
      <button className="btn btn-secondary btn-sm mb-2" onClick={onBack}>← חזרה</button>

      <ItemImage url={item.image_url} className="item-detail-img" emoji="📦" />

      <div className="card" style={{padding:'1.5rem'}}>
        <div className="item-detail-header">
          <div>
            <h2 className="item-detail-title">{item.title}</h2>
            {item.category && <span style={{fontSize:'0.8rem',color:'var(--text-light)'}}>🏷️ {item.category}</span>}
          </div>
          <div style={{textAlign:'left'}}>
            <div className="item-detail-price">₪{item.price.toLocaleString()}</div>
            <span className={`badge ${STATUS_CLS[item.status]}`}>{STATUS_LABEL[item.status]}</span>
          </div>
        </div>

        {item.description && <p style={{color:'var(--text-mid)',fontSize:'0.9rem',lineHeight:'1.6',marginBottom:'1rem'}}>{item.description}</p>}

        {item.pickup_date && (
          <div className="info-row">
            <span className="info-icon">📅</span>
            <span>איסוף: {new Date(item.pickup_date).toLocaleString('he-IL')}</span>
          </div>
        )}

        <div className="info-row">
          <span className="info-icon">👥</span>
          <span>{activeRegs.length} {activeRegs.length === 1 ? 'רשום' : 'רשומים'}</span>
        </div>

        <button className="btn btn-secondary btn-sm mt-1" onClick={share} style={{marginBottom:'0.5rem'}}>
          🔗 שתף פריט
        </button>

        <div className="divider" />

        <h3 style={{fontWeight:800,marginBottom:'1rem',fontSize:'1rem'}}>
          {activeRegs.length === 0 ? '📝 הרשמה' : '📋 הרשמה ורשימת המתנה'}
        </h3>

        <RegForm item={item} registrations={registrations} onRegister={onRegister} />

        {activeRegs.length > 0 && (
          <>
            <div className="divider" />
            <h4 style={{fontWeight:700,fontSize:'0.9rem',marginBottom:'0.75rem',color:'var(--text-mid)'}}>רשימת הממתינים</h4>
            <div className="card" style={{overflow:'hidden'}}>
              {activeRegs.map(r => (
                <div key={r.id} className="waitlist-item">
                  <div className="position-badge">{r.position}</div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,fontSize:'0.875rem'}}>{r.registrant_name}</div>
                    {r.note && <div style={{fontSize:'0.75rem',color:'var(--text-light)'}}>{r.note}</div>}
                  </div>
                </div>
              ))}
            </div>
          </>

// ─── Home Page ────────────────────────────────────────────────────────────────
function HomePage({ items, registrations, onItemClick }) {
  const [search, setSearch] = useState('');
  const [activeCategory, setActiveCategory] = useState('');
  const [statusFilter, setStatusFilter] = useState('');

  const categories = useMemo(() => {
    const cats = [...new Set(items.map(i=>i.category).filter(Boolean))];
    return cats.sort();
  }, [items]);

  const filtered = useMemo(() => {
    return items.filter(item => {
      const matchSearch = !search || 
        item.title.includes(search) || 
        item.description?.includes(search) ||
        item.category?.includes(search);
      const matchCat = !activeCategory || item.category === activeCategory;
      const matchStatus = !statusFilter || item.status === statusFilter;
      return matchSearch && matchCat && matchStatus;
    });
  }, [items, search, activeCategory, statusFilter]);

  const totalVal = items.filter(i=>i.status==='available').reduce((s,i)=>s+i.price,0);
  const regCount = registrations.filter(r=>r.status==='active').length;

  return (
    <div className="fade-in">
      <div className="hero">
        <div className="hero-content">
          <h2>🏡 מכירת החצר<br/>של בלסבלג פלטי</h2>
          <p>פריטים איכותיים במחירים מציאה — בואו לקחת לפני שנגמר!</p>
          <div className="hero-stats">
            <div className="hero-stat">
              <strong>{items.filter(i=>i.status==='available').length}</strong>
              <span>פריטים זמינים</span>
            </div>
            <div className="hero-stat">
              <strong>₪{totalVal.toLocaleString()}</strong>
              <span>שווי כולל</span>
            </div>
            <div className="hero-stat">
              <strong>{regCount}</strong>
              <span>רישומים</span>
            </div>
          </div>
        </div>
      </div>

      <div className="search-bar mb-2">
        <span className="search-icon">🔍</span>
        <input placeholder="חיפוש פריטים..." value={search} onChange={e=>setSearch(e.target.value)} />
        {search && <button onClick={()=>setSearch('')} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-light)',fontSize:'1rem'}}>✕</button>}
      </div>

      {categories.length > 0 && (
        <div className="flex flex-wrap gap-2 mb-2">
          <span className={`chip ${!activeCategory ? 'active' : ''}`} onClick={()=>setActiveCategory('')}>הכל</span>
          {categories.map(c => (
            <span key={c} className={`chip ${activeCategory===c ? 'active' : ''}`} onClick={()=>setActiveCategory(c===activeCategory?'':c)}>
              {c}
            </span>
          ))}
        </div>
      )}

      <div className="flex gap-2 mb-2 flex-wrap">
        {['', 'available','reserved','sold'].map(s => (
          <span key={s} className={`chip ${statusFilter===s ? 'active' : ''}`} onClick={()=>setStatusFilter(s)}>
            {s === '' ? 'כל הסטטוסים' : STATUS_DOT[s]+' '+STATUS_LABEL[s]}
          </span>
        ))}
      </div>

      {filtered.length === 0 ? (
        <div className="empty-state">
          <div className="emoji">🔍</div>
          <p>לא נמצאו פריטים תואמים</p>
        </div>
      ) : (
        <>
          <div className="section-title">{filtered.length} פריטים</div>
          <div className="items-grid">
            {filtered.map(item => (
              <ItemCard key={item.id} item={item} onClick={onItemClick} />
            ))}
          </div>
        </>
      )}
    </div>
  );
}

// ─── Item Form Modal ──────────────────────────────────────────────────────────
function ItemModal({ item, categories, onSave, onClose }) {
  const isEdit = !!item;
  const [form, setForm] = useState(item || {
    title:'', description:'', price:'', category:'', new_category:'',
    image_url:'', pickup_date:'', status:'available'
  });
  const [useNewCat, setUseNewCat] = useState(false);
  const fileRef = useRef();

  function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => setForm(p=>({...p, image_url: ev.target.result}));
    reader.readAsDataURL(file);
  }

  function submit(e) {
    e.preventDefault();
    const finalCategory = useNewCat ? form.new_category.trim() : form.category;
    onSave({
      ...form,
      category: finalCategory,
      price: parseFloat(form.price) || 0,
      id: item?.id || uid(),
      status: form.status || 'available'
    });
  }

  const catOptions = [...new Set([...categories, form.category].filter(Boolean))];

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <h2 className="modal-title">{isEdit ? '✏️ עריכת פריט' : '➕ פריט חדש'}</h2>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>

        <form onSubmit={submit}>
          <div className="form-group">
            <label className="form-label">שם הפריט *</label>
            <input className="form-control" value={form.title} required
              onChange={e=>setForm(p=>({...p,title:e.target.value}))} placeholder="מה אתה מוכר?" />
          </div>

          <div className="form-group">
            <label className="form-label">תיאור</label>
            <textarea className="form-control" value={form.description}
              onChange={e=>setForm(p=>({...p,description:e.target.value}))} placeholder="פרטים נוספים..." />
          </div>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
            <div className="form-group">
              <label className="form-label">מחיר (₪) *</label>
              <input className="form-control" type="number" min="0" step="0.01" required
                value={form.price} onChange={e=>setForm(p=>({...p,price:e.target.value}))} placeholder="0" />
            </div>
            <div className="form-group">
              <label className="form-label">סטטוס</label>
              <select className="form-control" value={form.status}
                onChange={e=>setForm(p=>({...p,status:e.target.value}))}>
                <option value="available">פנוי</option>
                <option value="reserved">שמור</option>
                <option value="sold">נמכר</option>
              </select>
            </div>
          </div>

          <div className="form-group">
            <label className="form-label">קטגוריה</label>
            {!useNewCat ? (
              <div style={{display:'flex',gap:'8px'}}>
                <select className="form-control" value={form.category}
                  onChange={e=>setForm(p=>({...p,category:e.target.value}))}>
                  <option value="">ללא קטגוריה</option>
                  {catOptions.map(c=><option key={c} value={c}>{c}</option>)}
                </select>
                <button type="button" className="btn btn-secondary btn-sm" style={{whiteSpace:'nowrap'}}
                  onClick={()=>setUseNewCat(true)}>+ חדשה</button>
              </div>
            ) : (
              <div style={{display:'flex',gap:'8px'}}>
                <input className="form-control" placeholder="שם קטגוריה חדשה" value={form.new_category}
                  onChange={e=>setForm(p=>({...p,new_category:e.target.value}))} />
                <button type="button" className="btn btn-secondary btn-sm"
                  onClick={()=>{setUseNewCat(false);setForm(p=>({...p,new_category:''}))}}>← קיימות</button>
              </div>
            )}
          </div>

          <div className="form-group">
            <label className="form-label">תאריך איסוף</label>
            <input className="form-control" type="datetime-local" value={form.pickup_date}
              onChange={e=>setForm(p=>({...p,pickup_date:e.target.value}))} />
          </div>

          <div className="form-group">
            <label className="form-label">תמונה</label>
            <div className="image-upload-area" onClick={()=>fileRef.current?.click()}>
              <div>📷 לחץ להעלאת תמונה / צלם</div>
              <div style={{fontSize:'0.75rem',color:'var(--text-light)',marginTop:'4px'}}>ניתן גם להדביק URL</div>
            </div>
            <input ref={fileRef} type="file" accept="image/*" capture="environment"
              style={{display:'none'}} onChange={handleFile} />
            <input className="form-control mt-1" placeholder="או הכנס URL תמונה..." value={form.image_url}
              onChange={e=>setForm(p=>({...p,image_url:e.target.value}))} />
            {form.image_url && <img src={form.image_url} className="image-preview" alt="תצוגה מקדימה" onError={()=>setForm(p=>({...p,image_url:''}))} />}
          </div>

          <div style={{display:'flex',gap:'8px',justifyContent:'flex-end',marginTop:'1.25rem'}}>
            <button type="button" className="btn btn-secondary" onClick={onClose}>ביטול</button>
            <button type="submit" className="btn btn-primary">
              {isEdit ? '💾 שמור שינויים' : '➕ הוסף פריט'}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [items, setItems] = useDB('ys_items', []);
  const [registrations, setRegs] = useDB('ys_regs', []);
  const [page, setPage] = useState('home');
  const [selectedItem, setSelectedItem] = useState(null);
  const [toast, setToast] = useState(null);
  const [mobileOpen, setMobileOpen] = useState(false);
  const [isAdmin, setIsAdmin] = useState(false);

  function showToast(msg) { setToast(msg); }

  function goTo(p) {
    setPage(p); setMobileOpen(false);
    if (p !== 'item') setSelectedItem(null);
    window.scrollTo(0,0);
  }

  function openItem(item) {
    setSelectedItem(item);
    setPage('item');
    window.scrollTo(0,0);
  }

  function handleRegister(reg) {
    setRegs(prev => {
      const next = [...prev, reg];
      DB.set('ys_regs', next);
      return next;
    });
    setItems(prev => prev.map(i => {
      if (i.id !== reg.item_id) return i;
      return i.status === 'available' ? {...i, status:'reserved'} : i;
    }));
    showToast('✅ נרשמת בהצלחה!');
  }

  function handleSaveItem(item) {
    setItems(prev => {
      const exists = prev.find(i=>i.id===item.id);
      return exists ? prev.map(i=>i.id===item.id?item:i) : [...prev, item];
    });
    showToast('💾 הפריט נשמר!');
  }

  function handleDeleteItem(id) {
    setItems(prev => prev.filter(i=>i.id!==id));
    setRegs(prev => prev.filter(r=>r.item_id!==id));
    showToast('🗑️ הפריט נמחק');
  }

  function handleDeleteReg(id) {
    setRegs(prev => prev.map(r=>r.id===id?{...r,status:'cancelled'}:r));
    showToast('❌ הרישום בוטל');
  }

  const navItems = [
    {id:'home', label:'דף ראשי', icon:'🏠'},
    {id:'admin', label:'ניהול', icon:'⚙️'},
  ];

  const currentItem = selectedItem ? items.find(i=>i.id===selectedItem.id) || selectedItem : null;

  return (
    <div className="app-layout">
      {/* Mobile overlay */}
      <div className={`mobile-overlay ${mobileOpen?'open':''}`} onClick={()=>setMobileOpen(false)} />

      {/* Sidebar */}
      <nav className={`sidebar ${mobileOpen?'mobile-open':''}`}>
        <div className="sidebar-logo">
          <h1>🏡 מכירת החצר<br/>בלסבלג פלטי</h1>
          <p>חד-פעמי · ירושלים</p>
        </div>
        <div className="sidebar-nav">
          {navItems.map(n => (
            <div key={n.id} className={`nav-item ${page===n.id||((page==='item')&&n.id==='home')?'active':''}`}
              onClick={()=>goTo(n.id)}>
              <span className="nav-icon">{n.icon}</span>
              {n.label}
            </div>
          ))}
        </div>
        <div style={{padding:'1rem 1.25rem',borderTop:'1px solid rgba(255,255,255,0.1)'}}>
          <div style={{fontSize:'0.72rem',color:'rgba(255,255,255,0.35)',lineHeight:1.6}}>
            {items.filter(i=>i.status==='available').length} פריטים פנויים
            <br />{registrations.filter(r=>r.status==='active').length} רישומים
          </div>
        </div>
      </nav>

      {/* Mobile header */}
      <header className="mobile-header">
        <h1>🏡 מכירת החצר</h1>
        <button className="hamburger" onClick={()=>setMobileOpen(o=>!o)}>
          {mobileOpen ? '✕' : '☰'}
        </button>
      </header>

      {/* Main */}
      <main className="main-content">
        {page === 'home' && (
          <HomePage items={items} registrations={registrations} onItemClick={openItem} />
        )}
        {page === 'item' && currentItem && (
          <ItemDetail
            item={currentItem}
            registrations={registrations}
            onRegister={handleRegister}
            onBack={()=>goTo('home')}
          />
        )}
        {page === 'admin' && (
          <AdminPage
            items={items}
            registrations={registrations}
            onSaveItem={handleSaveItem}
            onDeleteItem={handleDeleteItem}
            onDeleteReg={handleDeleteReg}
          />
        )}
      </main>

      {toast && <Toast msg={toast} onDone={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
